{% extends "base.html" %}

{% block title %}Newsletter Signup - Join Our Community{% endblock %}

{% block content %}
<div class="header">
    <h1>📬 Newsletter Signup</h1>
    <p>Join our community and stay updated with the latest news and updates!</p>
</div>

<form method="POST" action="{{ url_for('subscribe') }}" class="signup-form">
    <div class="form-group">
        <label for="first_name">First Name <span class="required">*</span></label>
        <input 
            type="text" 
            id="first_name" 
            name="first_name" 
            placeholder="John" 
            required 
            maxlength="100"
            value="{{ request.form.get('first_name', '') }}"
        >
    </div>

    <div class="form-group">
        <label for="last_name">Last Name <span class="required">*</span></label>
        <input 
            type="text" 
            id="last_name" 
            name="last_name" 
            placeholder="Doe" 
            required 
            maxlength="100"
            value="{{ request.form.get('last_name', '') }}"
        >
    </div>

    <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="john.doe@example.com" 
            required 
            maxlength="120"
            value="{{ request.form.get('email', '') }}"
        >
    </div>

    <div class="form-group">
        <label for="phone">Phone Number (Optional)</label>
        <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="+1 (555) 123-4567" 
            maxlength="20"
            value="{{ request.form.get('phone', '') }}"
        >
    </div>

    <div class="form-group">
        <label for="interests">Interests (Optional)</label>
        <textarea 
            id="interests" 
            name="interests" 
            placeholder="Tell us about your interests (e.g., technology, business, lifestyle)..."
            maxlength="255"
        >{{ request.form.get('interests', '') }}</textarea>
    </div>

    <button type="submit" class="button">Subscribe Now</button>
</form>

<p style="text-align: center; margin-top: 20px; color: #999; font-size: 12px;">
    We respect your privacy. Unsubscribe at any time.
</p>
{% endblock %}
